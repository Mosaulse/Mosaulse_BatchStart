<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatchStart 配置编辑器</title>
    <link rel="stylesheet" href="style.css">
    <!-- Prism.js 代码高亮 -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-ini.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>⚙️ BatchStart 配置编辑器</h1>
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle" title="切换主题">🌓</button>
                <button id="loadIniBtn" class="btn btn-secondary">📖 打开 apps.ini</button>
                <button id="saveBtn" class="btn btn-success">💾 保存到 apps.ini</button>
                <button id="exportBtn" class="btn btn-info">📤 导出备份</button>
                <button id="importBtn" class="btn btn-info">📥 导入备份</button>
                <input type="file" id="loadIniFile" accept=".ini" style="display: none;">
                <input type="file" id="importFile" accept=".ini,.json" style="display: none;">
            </div>
        </header>

        <main class="main-content">
            <!-- 应用配置区域 -->
            <section class="config-section">
                <div class="section-header">
                    <h2>📱 应用配置</h2>
                    <button id="addAppBtn" class="btn btn-small btn-primary">+ 添加应用</button>
                </div>
                <div id="appConfig" class="app-config">
                    <!-- 应用列表将通过 JavaScript 动态生成 -->
                </div>
            </section>

            <!-- 设置配置区域 -->
            <section class="config-section">
                <div class="section-header">
                    <h2>⚙️ 全局设置</h2>
                </div>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>写入日志文件</label>
                        <select id="WriteLog2Log" class="form-control">
                            <option value="true">是</option>
                            <option value="false">否</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>CPU使用率阈值 (%)</label>
                        <input type="number" id="CPUThreshold" class="form-control" min="0" max="100" value="50">
                    </div>
                    <div class="setting-item">
                        <label>最小启动间隔 (秒)</label>
                        <input type="number" id="MinInterval" class="form-control" min="0" value="1">
                    </div>
                    <div class="setting-item">
                        <label>日志文件路径</label>
                        <input type="text" id="LogFilePath" class="form-control" value="BatchStart.log">
                    </div>
                    <div class="setting-item">
                        <label>最大等待时间 (秒)</label>
                        <input type="number" id="MaxWaitTime" class="form-control" min="0" value="5">
                    </div>
                    <div class="setting-item">
                        <label>启动超时时间 (秒)</label>
                        <input type="number" id="StartTimeout" class="form-control" min="0" value="10">
                    </div>
                    <div class="setting-item">
                        <label>已运行应用处理方式</label>
                        <select id="AppAlreadyRunningAction" class="form-control">
                            <option value="Skip">跳过</option>
                            <option value="Restart">强制重启</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- 实时预览区域 -->
            <section class="config-section">
                <div class="section-header">
                    <h2>📄 实时配置预览</h2>
                    <button id="copyBtn" class="btn btn-small btn-secondary">📋 复制</button>
                </div>
                <div class="preview-container">
                    <pre class="preview-code"><code id="preview" class="language-ini"></code></pre>
                </div>
            </section>
        </main>

        <!-- 通知提示 -->
        <div id="notification" class="notification"></div>
    </div>

    <script src="config-editor.js"></script>
</body>

</html>
