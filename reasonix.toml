# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps   = 0
temperature = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix
# tier       = "lazy"   # lazy|background|eager

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "ToolName" or "ToolName(glob)"; '*' matches any run, '?' one char.
mode  = "ask"
# deny = ["bash(rm -rf*)", "bash(git push*)"]   # hard-blocked in every mode
allow = ["bash=powershell -NoProfile -Command \"& { param() try { [System.Management.Automation.Language.Parser]::ParseFile('BatchStart/BatchStart.ps1', [ref]$null, [ref]$null) } catch { Write-Host 'fail' } }\"", "bash=powershell -NoProfile -Command \"Get-Command pwsh* -ErrorAction SilentlyContinue\" 2>$null", "write_file=_syntax_check.ps1", "bash=powershell -NoProfile -ExecutionPolicy Bypass -File _syntax_check.ps1", "edit_file=BatchStart/BatchStart.ps1", "bash=powershell -NoProfile -Command \"Get-Content -Path BatchStart/BatchStart.ps1 -TotalCount 1 | Format-Hex\"", "bash=powershell -NoProfile -Command \"(Get-Item BatchStart/BatchStart.ps1).Length\"", "bash=powershell -NoProfile -Command \"Get-Content BatchStart/BatchStart.ps1 -TotalCount 5\"", "bash=powershell -NoProfile -Command \"Select-String -Path BatchStart/BatchStart.ps1 -Pattern '^function '\"", "bash=Select-String -Path apps.ini -Pattern '^\\[|\\]'", "bash=Remove-Item _syntax_check.ps1, _fix_enc.ps1, _fix_enc2.ps1 -Force -ErrorAction SilentlyContinue; Write-Host \"cleaned\"", "edit_file=BatchStart.bat", "edit_file=BatchStart/BatchStart_template.bat.text", "bash=powershell -NoProfile -Command \"Format-Hex -Path BatchStart.bat | Select-Object -First 20\"", "bash=powershell -NoProfile -Command \"Format-Hex -Path BatchStart.bat | Select-Object -Last 20\"", "bash=powershell -NoProfile -Command \"Format-Hex -Path BatchStart/BatchStart.ps1 | Select-Object -First 4\"", "edit_file=apps.ini", "write_file=BatchStart/BatchStart.ps1", "write_file=_utf8bom.ps1", "bash=powershell -NoProfile -ExecutionPolicy Bypass -File _utf8bom.ps1", "bash=powershell -NoProfile -Command \"$bytes = [System.IO.File]::ReadAllBytes((Resolve-Path 'BatchStart\\BatchStart.ps1')); if($bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF){Write-Host 'UTF-8 BOM OK' -F Green}else{Write-Host 'NO BOM' -F Red}; Write-Host ('Size: '+$bytes.Count)\"", "write_file=_chk.ps1", "bash=powershell -NoProfile -ExecutionPolicy Bypass -File _chk.ps1", "write_file=_listf.ps1", "write_file=BatchStart/apps_template.text", "edit_file=ConfighEditor/config-editor.html", "edit_file=ConfighEditor/config-editor.js", "edit_file=README.md", "delete_range=README.md", "bash=Remove-Item _utf8bom.ps1, _chk.ps1, _listf.ps1, _fix_encoding.ps1, _fix_enc.ps1, _fix_enc2.ps1, _syntax_check.ps1 -Force -ErrorAction SilentlyContinue; Write-Host \"cleaned\"", "bash=powershell -NoProfile -Command \"Select-String -Path BatchStart\\BatchStart.ps1 -Pattern '^function '\"", "bash=powershell -NoProfile -Command \"Select-String -Path BatchStart\\BatchStart.ps1 -Pattern '批量|启动|应用|配置|正在|阈值|等待|成功|跳过|失败|执行|智能'\"", "bash=powershell -NoProfile -Command \"Select-String -Path BatchStart\\BatchStart.ps1 -Pattern '✅|⚠️|❌|🚂|ℹ️|⏩|⏳|💻|📋|📱|📁|🚦|💨|🎉|🤣|⏰|⏏️|✨|🚀|🌟'\""]
# ask = ["write_file"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

